<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>US History Regents Review App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        header { background-color: #2c3e50; color: white; width: 100%; padding: 20px; text-align: center; }
        nav { width: 100%; background-color: #ecf0f1; padding: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        nav button { padding: 8px 16px; border: none; border-radius: 4px; background-color: #3498db; color: white; cursor: pointer; }
        nav button:hover { background-color: #2980b9; }
        #content { max-width: 800px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #bdc3c7; padding: 8px; text-align: left; }
        th { background-color: #e0e0e0; }
        .question { margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .question h4 { margin: 0 0 8px 0; }
        .options label { display: block; margin-bottom: 4px; cursor: pointer; }
        .feedback { font-weight: bold; margin-top: 5px; }
        .short-answer { margin-bottom: 12px; }
        textarea { width: 100%; padding: 8px; box-sizing: border-box; margin-top: 6px; margin-bottom: 12px; font-family: inherit; font-size: 1em; }

        /* Styles for games */
        .game-section { margin-bottom: 30px; }
        .grid-table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 10px; }
        .grid-table th, .grid-table td { border: 1px solid #bdc3c7; padding: 6px; text-align: center; }
        .grid-table th { background-color: #f0f0f0; }
        .grid-table input { width: 95%; padding: 4px; box-sizing: border-box; }
        .correct { background-color: #d4edda; }
        .incorrect { background-color: #f8d7da; }
        .hangman-word { font-size: 24px; letter-spacing: 4px; margin: 10px 0; }
        .hangman-info { margin: 5px 0; }

        /* Make Google Translate dropdown scrollable */
        #google_translate_element select {
            max-height: 200px;
            overflow-y: auto;
        }

        /* Hide the default Google Translate dropdown since we will provide our own language buttons */
        #google_translate_element {
            display: none;
        }

        /* Style for language translation buttons */
        .lang-buttons {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin: 8px 0;
        }
        .lang-buttons button {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .lang-buttons button:hover {
            background-color: #2980b9;
        }

        /* Styles for Connections game */
        .connections-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }
        .connections-grid button {
            padding: 8px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            cursor: pointer;
            background-color: #f8f9fa;
        }
        .connections-grid button.selected {
            background-color: #d0e0fc;
        }
        .connections-grid button.solved {
            background-color: #d4edda;
            cursor: default;
        }

        /* Styles for Geography game */
        .geo-choices {
            margin-top: 10px;
            margin-bottom: 10px;
        }
        .geo-choices label {
            display: block;
            margin-bottom: 4px;
            cursor: pointer;
        }
    </style>
</head>

portation, industrial technology and communications—fostered economic growth and increased demand for free and enslaved labor【825060215502005†L2529-L2538】.  Andrew Jackson’s presidency strengthened executive power but also produced controversial policies like the **Indian Removal Act**, leading to the Trail of Tears【825060215502005†L2539-L2544】.  As the nation grew, **sectionalism** deepened: disputes over states’ rights, economic differences and the expansion of slavery led to fragile compromises such as the Missouri Compromise (1820) and the Compromise of 1850【825060215502005†L2567-L2573】.  Abolitionists like Frederick Douglass and reformers including Elizabeth Cady Stanton fought for the abolition of slavery and women’s rights【825060215502005†L2554-L2566】.  Sectional tensions culminated in the election of Abraham Lincoln and the secession of Southern states, sparking the Civil War【825060215502005†L2575-L2583】.", ""], "vocabulary": [{"term": "Louisiana Purchase", "definition": "1803 purchase from France that doubled U.S. territory and opened the way for westward expansion【335720786567110†L47-L76】."}, {"term": "War of 1812", "definition": "Conflict between the United States and Britain over maritime rights; fostered nationalism and manufacturing."}, {"term": "Monroe Doctrine", "definition": "U.S. policy warning European powers not to interfere in the Western Hemisphere【885187583936118†L45-L63】."}, {"term": "Market Revolution", "definition": "Transformation of the U.S. economy through transportation (canals, railroads), technology and industrialization."}, {"term": "Nullification", "definition": "Theory that a state could invalidate federal laws it deemed unconstitutional; debated during the tariff crisis."}, {"term": "Manifest Destiny", "definition": "Belief that the United States was destined to expand across North America."}, {"term": "Abolitionism", "definition": "Movement to end slavery; led by figures such as Frederick Douglass and William Lloyd Garrison."}, {"term": "Seneca Falls Convention", "definition": "1848 women’s rights convention producing the Declaration of Sentiments demanding equality【825060215502005†L2554-L2566】."}, {"term": "Compromise of 1850", "definition": "Series of laws admitting California as a free state, strengthening the Fugitive Slave Act and organizing western territories."}, {"term": "Dred Scott decision", "definition": "1857 Supreme Court case ruling that enslaved Africans were not citizens and Congress could not ban slavery in territories."}, {"term": "Kansas–Nebraska Act", "definition": "1854 law applying popular sovereignty to slavery in Kansas and Nebraska, leading to violence (“Bleeding Kansas”)."}], "mc_questions": [{"number": 1, "question": "In the **Louisiana Purchase**, President Thomas Jefferson was conflicted because he", "options": [{"label": "A", "text": "believed purchasing land exceeded presidential constitutional powers【335720786567110†L58-L63】"}, {"label": "B", "text": "wanted to expand slavery into the West"}, {"label": "C", "text": "refused to negotiate with France"}, {"label": "D", "text": "sought to cede the land to Britain"}]}, {"number": 2, "question": "Which statement best expresses the main idea of the **Monroe Doctrine**?", "options": [{"label": "A", "text": "European nations must respect the Western Hemisphere as a U.S. sphere of influence【885187583936118†L45-L63】"}, {"label": "B", "text": "European nations should form alliances with Latin American countries"}, {"label": "C", "text": "The United States will remain neutral in European wars"}, {"label": "D", "text": "The United States will annex territories in Europe"}]}, {"number": 3, "question": "The **Missouri Compromise** (1820) was important because it", "options": [{"label": "A", "text": "ended the debate over slavery permanently"}, {"label": "B", "text": "maintained the balance of power between free and slave states"}, {"label": "C", "text": "abolished slavery north of the Ohio River"}, {"label": "D", "text": "granted statehood to Texas"}]}, {"number": 4, "question": "Leaders of the **Seneca Falls Convention** demanded that women", "options": [{"label": "A", "text": "receive the right to vote and equal legal status【825060215502005†L2554-L2566】"}, {"label": "B", "text": "return to traditional roles"}, {"label": "C", "text": "support the Fugitive Slave Act"}, {"label": "D", "text": "oppose abolitionism"}]}, {"number": 5, "question": "The term **Manifest Destiny** refers to the belief that", "options": [{"label": "A", "text": "foreign powers should control North American territories"}, {"label": "B", "text": "the United States was destined to expand across the continent"}, {"label": "C", "text": "slavery should spread to all territories"}, {"label": "D", "text": "states have the right to nullify federal laws"}]}], "short_answers": ["Identify two causes of growing sectionalism in the United States before the Civil War and explain how each contributed to tension between the North and the South.", "Describe one reform movement of the antebellum period (e.g., abolition or women’s rights) and explain its impact on American society."], "answer_key": {"1": "A", "2": "A", "3": "B", "4": "A", "5": "B"}}, {"number": 4, "title": "Civil War and Reconstruction (1860–1877)", "overview": ["", "Long‑standing disputes over states’ rights and slavery culminated in the Civil War.  The Union possessed greater industrial capacity and transportation networks, while the Confederacy relied on superior military leadership【825060215502005†L2583-L2588】.  The war expanded presidential and federal powers, including the suspension of habeas corpus and the issuance of the **Emancipation Proclamation**, which shifted the Union’s war aim toward abolition【825060215502005†L2594-L2599】.  After the Union victory, constitutional amendments abolished slavery and expanded civil rights: the **13th Amendment** (1865) abolished slavery, **14th Amendment** defined citizenship and guaranteed equal protection, and **15th Amendment** prohibited denying voting rights based on race【523416977565636†L45-L73】.  Reconstruction governments attempted to rebuild the South and protect freedpeople, but resistance groups like the Ku Klux Klan and Jim Crow laws undermined these efforts【825060215502005†L2621-L2626】.  The Compromise of 1877 ended Reconstruction; federal troops withdrew from the South, and rights were curtailed for decades【825060215502005†L2621-L2634】.", ""], "vocabulary": [{"term": "Secession", "definition": "Formal withdrawal of Southern states from the Union following Lincoln’s election."}, {"term": "Emancipation Proclamation", "definition": "1863 executive order freeing enslaved people in Confederate states; shifted war goals to emancipation."}, {"term": "Gettysburg Address", "definition": "Lincoln’s 1863 speech emphasizing national unity and democratic ideals."}, {"term": "13th Amendment", "definition": "Constitutional amendment abolishing slavery in the U.S.【523416977565636†L45-L73】."}, {"term": "14th Amendment", "definition": "Defined citizenship and guaranteed equal protection and due process."}, {"term": "15th Amendment", "definition": "Prohibited denying the right to vote based on race, color or previous condition of servitude."}, {"term": "Freedmen’s Bureau", "definition": "Federal agency assisting formerly enslaved people with education, jobs and legal aid during Reconstruction."}, {"term": "Black Codes", "definition": "Southern laws restricting the rights of African Americans after the Civil War."}, {"term": "Jim Crow Laws", "definition": "State and local laws enforcing racial segregation and disenfranchisement."}, {"term": "Sharecropping", "definition": "Agricultural system in which freedpeople farmed land in exchange for a share of the crop; often led to debt peonage."}], "mc_questions": [{"number": 1, "question": "Which advantage did the Union have over the Confederacy during the Civil War?", "options": [{"label": "A", "text": "Greater number of experienced military officers"}, {"label": "B", "text": "Control of most railroads and industrial resources【825060215502005†L2583-L2588】"}, {"label": "C", "text": "Stronger support from European allies"}, {"label": "D", "text": "More familiarity with the terrain"}]}, {"number": 2, "question": "The **Emancipation Proclamation** was significant because it", "options": [{"label": "A", "text": "freed all enslaved people in the United States"}, {"label": "B", "text": "abolished slavery immediately after the war"}, {"label": "C", "text": "changed the focus of the war to include ending slavery and discouraged foreign support for the Confederacy【825060215502005†L2594-L2599】"}, {"label": "D", "text": "authorized states to secede from the Union"}]}, {"number": 3, "question": "The **13th, 14th and 15th Amendments** are often referred to as the Reconstruction Amendments because they", "options": [{"label": "A", "text": "restored voting rights to former Confederates"}, {"label": "B", "text": "expanded civil rights and citizenship for African Americans【523416977565636†L45-L73】"}, {"label": "C", "text": "limited federal power and promoted states’ rights"}, {"label": "D", "text": "were part of the Constitution before the Civil War"}]}, {"number": 4, "question": "Which statement best describes a result of the **Compromise of 1877**?", "options": [{"label": "A", "text": "Reconstruction governments continued to receive federal support"}, {"label": "B", "text": "Federal troops were withdrawn from the South, effectively ending Reconstruction【825060215502005†L2621-L2634】"}, {"label": "C", "text": "The Civil Rights Act of 1866 was repealed"}, {"label": "D", "text": "Southern states were punished more severely for rebellion"}]}, {"number": 5, "question": "During Reconstruction, **Black Codes** were enacted in the South to", "options": [{"label": "A", "text": "provide equal economic opportunities for freedpeople"}, {"label": "B", "text": "restrict the rights of African Americans and maintain white supremacy【825060215502005†L2621-L2626】"}, {"label": "C", "text": "punish former Confederate leaders"}, {"label": "D", "text": "integrate public schools"}]}], "short_answers": ["Explain two ways in which the Reconstruction Amendments sought to expand the rights of African Americans.  Provide specific examples.", "Identify one success and one failure of Reconstruction policies."], "answer_key": {"1": "B", "2": "C", "3": "B", "4": "B", "5": "B"}}, {"number": 5, "title": "Industrialization, Urbanization and Progressivism (1850–1920)", "overview": ["", "After the Civil War, the United States experienced rapid **industrialization** and **urbanization**.  New technologies, abundant natural resources and government policies fostering business growth allowed powerful industrialists (“robber barons”) to build large corporations.  Railroads connected national markets, while immigration supplied labor for factories.  Poor working conditions and political corruption spurred the **Progressive movement**, a reform movement that sought to improve society and government.  According to the U.S. Department of State, Progressives aimed to curb political corruption, limit the influence of large corporations and advocate reforms such as civil service exams, food safety laws and greater political rights for women and workers【561878006071778†L15-L27】.  Muckraking journalists like **Upton Sinclair** exposed abuses; reformers advocated antitrust laws, direct election of senators (17th Amendment), women’s suffrage (19th Amendment), prohibition (18th Amendment) and workplace protections.  Presidents Theodore Roosevelt, William Howard Taft and Woodrow Wilson used federal power to regulate business and conserve natural resources.  Progressive reforms laid the groundwork for later New Deal social programs.", ""], "vocabulary": [{"term": "Gilded Age", "definition": "Late‑19th‑century era of rapid economic growth and ostentatious wealth contrasted with poverty and corruption."}, {"term": "Robber Baron", "definition": "Derogatory term for powerful industrialists who used questionable practices to amass wealth."}, {"term": "Monopoly/Trust", "definition": "Company that controls an entire industry, limiting competition."}, {"term": "Laissez‑faire", "definition": "Economic philosophy advocating minimal government interference in business."}, {"term": "Labor Union", "definition": "Organized association of workers seeking better wages and conditions (e.g., AFL, Knights of Labor)."}, {"term": "Muckrakers", "definition": "Investigative journalists who exposed social, political and economic problems (e.g., Ida Tarbell, Upton Sinclair)."}, {"term": "Progressive Amendments", "definition": "16th (income tax), 17th (direct election of senators), 18th (prohibition), 19th (women’s suffrage)."}, {"term": "Initiative/Referendum/Recall", "definition": "Reforms allowing voters to propose laws, approve laws and remove elected officials."}, {"term": "Sherman Antitrust Act", "definition": "1890 law that outlawed monopolistic business practices."}, {"term": "Pure Food and Drug Act", "definition": "1906 law requiring truthful labeling and safety standards for food and medicine."}], "mc_questions": [{"number": 1, "question": "During the **Gilded Age**, many industrial leaders defended their wealth using the theory of", "options": [{"label": "A", "text": "socialism"}, {"label": "B", "text": "social Darwinism"}, {"label": "C", "text": "the social gospel"}, {"label": "D", "text": "communism"}]}, {"number": 2, "question": "Which Progressive reform gave voters the power to directly propose new laws?", "options": [{"label": "A", "text": "Initiative"}, {"label": "B", "text": "Referendum"}, {"label": "C", "text": "Recall"}, {"label": "D", "text": "Secret ballot"}]}, {"number": 3, "question": "Upton Sinclair’s novel **The Jungle** exposed conditions in the meatpacking industry and directly contributed to the passage of the", "options": [{"label": "A", "text": "Sherman Antitrust Act"}, {"label": "B", "text": "Pure Food and Drug Act"}, {"label": "C", "text": "18th Amendment"}, {"label": "D", "text": "Chinese Exclusion Act"}]}, {"number": 4, "question": "Which amendment granted women the right to vote nationwide?", "options": [{"label": "A", "text": "16th Amendment"}, {"label": "B", "text": "17th Amendment"}, {"label": "C", "text": "18th Amendment"}, {"label": "D", "text": "19th Amendment"}]}, {"number": 5, "question": "Theodore Roosevelt’s **Square Deal** policies focused on", "options": [{"label": "A", "text": "avoiding government interference in the economy"}, {"label": "B", "text": "supporting big business at any cost"}, {"label": "C", "text": "protecting consumers, breaking up trusts and conserving natural resources"}, {"label": "D", "text": "refusing to regulate railroads"}]}], "short_answers": ["Identify two problems associated with rapid industrialization and urbanization and explain how Progressive reformers attempted to address each problem.", "Describe one way in which the federal government increased its regulation of business during the Progressive Era."], "answer_key": {"1": "B", "2": "A", "3": "B", "4": "D", "5": "C"}}, {"number": 6, "title": "Rise of American Power and World War I (1890–1920)", "overview": ["", "At the turn of the 20th century, the United States pursued **imperialist** policies.  The **Spanish–American War** (1898) resulted in the United States acquiring Puerto Rico, Guam and the Philippines and exerting influence over Cuba.  The **Roosevelt Corollary** to the Monroe Doctrine asserted the U.S. right to act as an “international police power” in the Western Hemisphere【885187583936118†L71-L79】.  As World War I broke out in Europe, the United States initially maintained neutrality but provided aid through the **Lend‑Lease** program and eventually entered the war in 1917 after repeated German submarine attacks and the Zimmermann Telegram.  Under President Woodrow Wilson, the United States mobilized economically and militarily.  Wilson’s **Fourteen Points** advocated self‑determination, open diplomacy and the creation of a **League of Nations**; however, the U.S. Senate rejected membership in the League.  The war’s end led to social changes, including the **Great Migration** of African Americans to northern cities and increasing demands for civil liberties at home.", ""], "vocabulary": [{"term": "Imperialism", "definition": "Policy by which stronger nations extend their economic, political or military control over weaker territories."}, {"term": "Spanish–American War", "definition": "1898 conflict that resulted in U.S. control of former Spanish colonies (Puerto Rico, Guam, Philippines) and influence in Cuba."}, {"term": "Roosevelt Corollary", "definition": "Theodore Roosevelt’s extension of the Monroe Doctrine claiming the right of the U.S. to intervene in Latin America【885187583936118†L71-L79】."}, {"term": "Yellow Journalism", "definition": "Sensationalized news reporting that contributed to public support for the Spanish–American War."}, {"term": "Open Door Policy", "definition": "U.S. policy calling for equal trading rights in China."}, {"term": "Unrestricted Submarine Warfare", "definition": "German policy of sinking ships without warning; a major factor in U.S. entry into World War I."}, {"term": "Selective Service Act", "definition": "Law requiring men to register for the draft during World War I."}, {"term": "Fourteen Points", "definition": "President Wilson’s plan for post‑war peace emphasizing self‑determination and the League of Nations."}, {"term": "League of Nations", "definition": "International organization proposed by Wilson to promote peace; the U.S. did not join."}, {"term": "Great Migration", "definition": "Movement of African Americans from the rural South to northern cities during and after World War I."}], "mc_questions": [{"number": 1, "question": "The **Roosevelt Corollary** to the Monroe Doctrine justified", "options": [{"label": "A", "text": "U.S. neutrality in Latin American affairs"}, {"label": "B", "text": "U.S. intervention in Latin America to correct “chronic wrongdoing”【885187583936118†L71-L79】"}, {"label": "C", "text": "European colonization in the Western Hemisphere"}, {"label": "D", "text": "the abolition of the Monroe Doctrine"}]}, {"number": 2, "question": "What was the immediate cause of the U.S. entry into World War I?", "options": [{"label": "A", "text": "German resumption of unrestricted submarine warfare and the Zimmermann Telegram"}, {"label": "B", "text": "The assassination of Archduke Franz Ferdinand"}, {"label": "C", "text": "The sinking of the Titanic"}, {"label": "D", "text": "The Bolshevik Revolution"}]}, {"number": 3, "question": "President Woodrow Wilson’s **Fourteen Points** were meant to", "options": [{"label": "A", "text": "punish Germany and demand war reparations"}, {"label": "B", "text": "encourage isolationism in the United States"}, {"label": "C", "text": "provide a plan for a just and lasting peace, including a League of Nations"}, {"label": "D", "text": "establish colonial rule over defeated nations"}]}, {"number": 4, "question": "The U.S. Senate refused to ratify the Treaty of Versailles primarily because", "options": [{"label": "A", "text": "it included provisions to dismantle German territory"}, {"label": "B", "text": "it failed to grant independence to the Philippines"}, {"label": "C", "text": "many senators believed that joining the League of Nations could draw the U.S. into future wars"}, {"label": "D", "text": "President Wilson opposed the treaty"}]}], "short_answers": ["Explain two arguments used by supporters and opponents of U.S. imperialism at the turn of the 20th century.", "How did World War I affect the rights and opportunities of women and African Americans in the United States?"], "answer_key": {"1": "B", "2": "A", "3": "C", "4": "C"}}, {"number": 7, "title": "Prosperity and Depression (1920–1940)", "overview": ["", "The 1920s were characterized by economic prosperity, consumerism, nativism and cultural change.  Technological innovations like the automobile, radio and assembly line boosted production and consumption.  Women gained the right to vote (19th Amendment) and participated more in public life.  The **Harlem Renaissance** celebrated African‑American cultural achievements.  However, speculative investments and uneven wealth distribution contributed to the **Stock Market Crash of 1929** and the onset of the **Great Depression**.  President Franklin D. Roosevelt’s **New Deal** program sought to relieve suffering, spur recovery and reform the economy.  According to the Library of Congress, Roosevelt’s first Hundred Days produced banking reforms, emergency relief and work‑relief programs; later, programs such as Social Security and the Works Progress Administration expanded the federal role in social welfare【123483348790548†L55-L77】.  New Deal programs helped alleviate distress and established a precedent for federal government intervention in the economy【123483348790548†L74-L77】.", ""], "vocabulary": [{"term": "Consumerism", "definition": "Cultural emphasis on the acquisition of goods and services, fueled by advertising and credit in the 1920s."}, {"term": "Harlem Renaissance", "definition": "1920s cultural movement celebrating African‑American literature, art and music."}, {"term": "Prohibition (18th Amendment)", "definition": "Ban on the manufacture and sale of alcoholic beverages (1920–1933)."}, {"term": "Stock Market Crash (1929)", "definition": "Collapse in stock prices marking the beginning of the Great Depression."}, {"term": "Great Depression", "definition": "Severe economic downturn of the 1930s characterized by high unemployment and bank failures."}, {"term": "Dust Bowl", "definition": "Severe drought and soil erosion in the Great Plains causing agricultural devastation and migration."}, {"term": "New Deal", "definition": "Roosevelt’s program of relief, recovery and reform; included agencies like CCC, WPA and laws like Social Security Ac le": "Social and Economic Change / Civil Rights (1945–1991)", "overview": ["", "The decades after World War II saw profound social, economic and political changes.  A nationwide **civil rights movement** demanded equal rights for African Americans through tactics such as sit‑ins, boycotts, marches and lobbying; activists faced violence and assassination but succeeded in achieving landmark legislation【506630025427123†L53-L62】.  Key moments included the **Brown v. Board of Education** decision ending school segregation, Rosa Parks’ arrest and the Montgomery Bus Boycott, the Little Rock crisis, the Birmingham campaign, the **March on Washington**, the Selma marches and the passage of the **Civil Rights Act of 1964** and **Voting Rights Act of 1965**【506630025427123†L64-L126】.  Other groups sought expanded rights: the women’s rights movement won workplace equality and reproductive rights; the LGBTQ movement pushed for recognition; Native Americans and Latinx communities fought for autonomy and representation.  Meanwhile, the post‑war economy boomed; suburbanization and the GI Bill expanded the middle class.  Presidents Kennedy and Johnson’s **New Frontier** and **Great Society** programs aimed to fight poverty and racial injustice.  Environmentalism, inspired by Rachel Carson’s *Silent Spring*, led to laws protecting air and water.", ""], "vocabulary": [{"term": "Civil Rights Movement", "definition": "Struggle for social justice and equal rights for African Americans, culminating in major legislation【506630025427123†L53-L62】."}, {"term": "Brown v. Board of Education", "definition": "1954 Supreme Court decision declaring segregated public schools unconstitutional【506630025427123†L64-L75】."}, {"term": "Montgomery Bus Boycott", "definition": "1955–1956 boycott triggered by Rosa Parks’ arrest; propelled Martin Luther King Jr. to national prominence【506630025427123†L76-L81】."}, {"term": "Civil Rights Act of 1964", "definition": "Law banning segregation and discrimination bas         // Create a hangman-style word guess game using vocabulary terms
        function initHangmanGame() {
            // Gather a list of sanitized vocabulary words from unitsData
            const words = [];
            unitsData.forEach(unit => {
                unit.vocabulary.forEach(item => {
                    // Sanitize term: remove citations, non-letters, spaces
                    let term = (item.term || '').replace(/【[^】]*】/g, '').replace(/[^A-Za-z]/g, '').toLowerCase();
                    if (term.length >= 4 && term.length <= 12) {
                        words.push(term);
                    }
                });
            });
            // Fallback if no words found
            if (words.length === 0) {
                words.push('history');
            }
            let selectedWord = '';
            let displayArray = [];
            let wrongLetters = [];
            // Function to choose a new word
            function chooseWord() {
                selectedWord = words[Math.floor(Math.random() * words.length)];
                displayArray = Array.from(selectedWord).map(() => '_');
                wrongLetters = [];
                updateDisplay();
                message.textContent = '';
                guessInput.disabled = false;
                guessButton.disabled = false;
            }
            // Create elements
            const section = document.createElement('div');
            section.className = 'game-section';
            const title = document.createElement('h3');
            title.textContent = 'Word Guess Game';
            section.appendChild(title);
            const instructions = document.createElement('p');
            instructions.textContent = 'Guess the hidden vocabulary term by entering one letter at a time. You have 6 incorrect guesses.';
            section.appendChild(instructions);
            const wordDisplay = document.createElement('div');
            wordDisplay.className = 'hangman-word';
            section.appendChild(wordDisplay);
            const wrongDiv = document.createElement('div');
            wrongDiv.className = 'hangman-info';
            section.appendChild(wrongDiv);
            const inputContainer = document.createElement('div');
            inputContainer.className = 'hangman-info';
            const guessInput = document.createElement('input');
            guessInput.type = 'text';
            guessInput.maxLength = 1;
            guessInput.style.width = '30px';
            guessInput.placeholder = 'a';
            const guessButton = document.createElement('button');
            guessButton.textContent = 'Guess';
            inputContainer.appendChild(guessInput);
            inputContainer.appendChild(guessButton);
            section.appendChild(inputContainer);
            const message = document.createElement('p');
            section.appendChild(message);
            const restartBtn = document.createElement('button');
            restartBtn.textContent = 'New Word';
            restartBtn.addEventListener('click', chooseWord);
            section.appendChild(restartBtn);
            // Update display of word and wrong letters
            function updateDisplay() {
                wordDisplay.textContent = displayArray.join(' ');
                wrongDiv.textContent = 'Wrong letters: ' + wrongLetters.join(', ');
            }
            // Handle guess
            guessButton.addEventListener('click', function() {
                const letter = guessInput.value.toLowerCase();
                guessInput.value = '';
                if (!/^[a-z]$/.test(letter)) {
                    message.textContent = 'Please enter a single letter (a–z).';
                    return;
                }
                if (displayArray.includes(letter) || wrongLetters.includes(letter)) {
                    message.textContent = 'You already guessed that letter.';
                    return;
                }
                if (selectedWord.includes(letter)) {
                    for (let i = 0; i < selectedWord.length; i++) {
                        if (selectedWord[i] === letter) {
                            displayArray[i] = letter;
                        }
                    }
                    updateDisplay();
                    if (displayArray.join('') === selectedWord) {
                        // Player has guessed the word correctly
                        message.textContent = 'Correct! The word was \'' + selectedWord + '\'.';
                        // Append definition/explanation if available
                        if (vocabMap[selectedWord]) {
                            message.textContent += ' Definition: ' + vocabMap[selectedWord];
                        }
                        guessInput.disabled = true;
                        guessButton.disabled = true;
                    }
                } else {
                    wrongLetters.push(letter);
                    updateDisplay();
                    if (wrongLetters.length >= 6) {
                        // Player used up all guesses
                        message.textContent = 'Game over! The word was \'' + selectedWord + '\'.';
                        // Provide definition/explanation if available
                        if (vocabMap[selectedWord]) {
                            message.textContent += ' Definition: ' + vocabMap[selectedWord];
                        }
                        guessInput.disabled = true;
                        guessButton.disabled = true;
                    }
                }
            });
            // Initialize game
            chooseWord();
            return section;
        }

                const oldExpl = section.querySelectorAll('.grid-explanation');
                oldExpl.forEach(el => el.remove());
                if (wrongMessages.length > 0) {
                    const explTitle = document.createElement('p');
                    explTitle.className = 'grid-explanation';
                    explTitle.style.fontWeight = 'bold';
                    explTitle.textContent = 'Explanations for incorrect cells:';
                    section.appendChild(explTitle);
                    wrongMessages.forEach(msg => {
                        const p = document.createElement('p');
                        p.className = 'grid-explanation';
                        p.textContent = msg;
                        section.appendChild(p);
                    });
                }
            });
            return section;
        }

        // Create a Connections-style word grouping game
        function initConnectionsGame() {
            // Define an array of puzzles; each puzzle has categories with titles and items
            const puzzles = [
                {
                    categories: [
                        { title: 'Amendments', items: ['13th Amendment','19th Amendment','1st Amendment','26th Amendment'] },
                        { title: 'Supreme Court Cases', items: ['Marbury v. Madison','Brown v. Board','Roe v. Wade','Miranda v. Arizona'] },
                        { title: 'Founding Documents', items: ['Mayflower Compact','Declaration of Independence','Articles of Confederation','U.S. Constitution'] },
                        { title: 'Reform Movements', items: ['Progressive Movement','Civil Rights Movement','Women\'s Suffrage','Environmental Movement'] }
                    ]
                },
                {
                    categories: [
                        { title: 'Wars', items: ['Revolutionary War','War of 1812','Mexican-American War','Civil War'] },
                        { title: 'Foreign Policy Doctrines', items: ['Monroe Doctrine','Roosevelt Corollary','Truman Doctrine','Containment Policy'] },
                        { title: 'Constitutional Principles', items: ['Checks and Balances','Separation of Powers','Federalism','Popular Sovereignty'] },
                        { title: 'Presidents', items: ['George Washington','Abraham Lincoln','Franklin D. Roosevelt','John F. Kennedy'] }
                    ]
                },
                {
                    categories: [
                        { title: 'New Deal Programs', items: ['Social Security','CCC','FDIC','Tennessee Valley Authority'] },
                        { title: 'Civil Rights Laws', items: ['Civil Rights Act of 1964','Voting Rights Act of 1965','Fair Housing Act','14th Amendment'] },
                        { title: 'Industrial Titans', items: ['Andrew Carnegie','John D. Rockefeller','Cornelius Vanderbilt','J.P. Morgan'] },
                        { title: 'Cold War Events', items: ['Berlin Blockade','Korean War','Cuban Missile Crisis','Vietnam War'] }
                    ]
                },
                {
                    categories: [
                        { title: 'Expansion & Sectionalism', items: ['Louisiana Purchase','Manifest Destiny','Kansas-Nebraska Act','Missouri Compromise'] },
                        { title: 'Supreme Court (Civil Rights)', items: ['Plessy v. Ferguson','Brown v. Board','Dred Scott v. Sandford','Loving v. Virginia'] },
                        { title: 'Labor Organizations', items: ['Knights of Labor','American Federation of Labor','Congress of Industrial Organizations','Industrial Workers of the World'] },
                        { title: 'Environmental Laws', items: ['Clean Air Act','Clean Water Act','Endangered Species Act','National Environmental Policy Act'] }
                    ]
                },
                // New puzzles reflecting later units and updated content
                {
                    categories: [
                        { title: 'Industrial Reformers', items: ['Upton Sinclair','Ida Tarbell','Jane Addams','Jacob Riis'] },
                        { title: 'World War II Leaders', items: ['Franklin D. Roosevelt','Dwight D. Eisenhower','Harry Truman','Winston Churchill'] },
                        { title: 'Civil Rights Organizations', items: ['NAACP','CORE','SNCC','SCLC'] },
                        { title: 'Great Society Programs', items: ['Medicare','Medicaid','Head Start','Civil Rights Act of 1964'] }
                    ]
                },
                {
                    categories: [
                        { title: 'Cold War Policies', items: ['Marshall Plan','Truman Doctrine','Eisenhower Doctrine','Containment Policy'] },
                        { title: 'Recent Supreme Court Cases', items: ['Roe v. Wade','Miranda v. Arizona','Obergefell v. Hodges','Citizens United v. FEC'] },
                        { title: 'Environmental Events', items: ['Dust Bowl','Three Mile Island','Chernobyl','Deepwater Horizon'] },
                        { title: 'Post‑9/11 Legislation', items: ['USA PATRIOT Act','Homeland Security Act','Affordable Care Act','No Child Left Behind'] }
                    ]
                }
            ];
            // Determine daily puzzle based on current date to vary puzzles; fallback to random if something fails
            const todayIndex = Math.floor(Date.now() / 86400000);
            const puzzle = puzzles[todayIndex % puzzles.length];
            // Flatten all items and shuffle them
            const allItems = [];
            puzzle.categories.forEach(cat => cat.items.forEach(item => allItems.push(item)));
            // Fisher-Yates shuffle
            for (let i = allItems.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allItems[i], allItems[j]] = [allItems[j], allItems[i]];
            }
            // Track selected items and solved categories
            let selected = [];
            let solvedCount = 0;
            const solvedTitles = [];
            // Create section
            const section = document.createElement('div');
            section.className = 'game-section';
            const title = document.createElement('h3');
            title.textContent = 'Connections Game';
            section.appendChild(title);
            const instructions = document.createElement('p');
            instructions.textContent = 'Select four terms that share a common theme. When you think you have a complete group, click "Submit Group". Try to find all four groups. Categories change daily.';
            section.appendChild(instructions);
            // Create grid container
            const grid = document.createElement('div');
            grid.className = 'connections-grid';
            allItems.forEach(item => {
                const btn = document.createElement('button');
                btn.textContent = item;
                btn.addEventListener('click', function() {
                    if (btn.classList.contains('solved')) return; // skip solved
                    // toggle selection
                    if (btn.classList.contains('selected')) {
                        btn.classList.remove('selected');
                        selected = selected.filter(w => w !== item);
                    } else {
                        if (selected.length === 4) {
                            // cannot select more than 4
                            return;
                        }
                        btn.classList.add('selected');
                        selected.push(item);
                    }
                });
                grid.appendChild(btn);
            });
            section.appendChild(grid);
            // message display
            const msgPara = document.createElement('p');
            section.appendChild(msgPara);
            // list of discovered categories
            const foundDiv = document.createElement('div');
            section.appendChild(foundDiv);
            // Submit button
            const submitBtn = document.createElement('button');
            submitBtn.textContent = 'Submit Group';
            submitBtn.addEventListener('click', function() {
                if (selected.length !== 4) {
                    msgPara.textContent = 'Please select exactly four terms.';
                    msgPara.style.color = 'red';
                    return;
                }
                // Check if selected words match one of the categories
                let matchFound = false;
                puzzle.categories.forEach(cat => {
                    if (matchFound) return;
                    const catSet = new Set(cat.items);
                    const allSelectedMatch = selected.every(word => catSet.has(word));
                    if (allSelectedMatch && !solvedTitles.includes(cat.title)) {
                        matchFound = true;
                        solvedTitles.push(cat.title);
                        solvedCount++;
                        // mark buttons as solved
                        Array.from(grid.children).forEach(btnEl => {
                            if (selected.includes(btnEl.textContent)) {
                                btnEl.classList.remove('selected');
                                btnEl.classList.add('solved');
                                // disable further selection
                            }
                        });
                        // update foundDiv
                        const catMsg = document.createElement('p');
                        catMsg.textContent = 'Group Found: ' + cat.title + ' — ' + cat.items.join(', ');
                        catMsg.style.color = '#155724';
                        foundDiv.appendChild(catMsg);
                        msgPara.textContent = 'Correct! You found a group.';
                        msgPara.style.color = 'green';
                        selected = [];
                        if (solvedCount === puzzle.categories.length) {
                            const winMsg = document.createElement('p');
                            winMsg.textContent = 'Congratulations! You solved all connections!';
                            winMsg.style.fontWeight = 'bold';
                            winMsg.style.color = '#155724';
                            foundDiv.appendChild(winMsg);
                        }
                    }
                });
                if (!matchFound) {
                    // Compute hints: count how many of the selected words belong to each category
                    const catCount = {};
                    selected.forEach(word => {
                        puzzle.categories.forEach(cat => {
                            if (cat.items.includes(word)) {
                                catCount[cat.title] = (catCount[cat.title] || 0) + 1;
                            }
                        });
                    });
                    const hints = [];
                    Object.entries(catCount).forEach(([title, count]) => {
                        hints.push(count + ' word(s) from ' + title);
                    });
                    const hintText = hints.length ? ' Hint: ' + hints.join('; ') + '.' : '';
                    msgPara.textContent = 'That group is not correct.' + hintText;
                    msgPara.style.color = 'red';
                    // unselect all selected buttons
                    Array.from(grid.children).forEach(btnEl => {
                        if (selected.includes(btnEl.textContent)) {
                            btnEl.classList.remove('selected');
                        }
                    });
                    selected = [];
                }
            });
            section.appendChild(submitBtn);
            return section;
        }

        // Create a geography identification game linking physical features to units
        function initGeographyGame() {
            // Define geographic features with associated unit numbers and explanations
            // Unit numbers correspond to those in the unitsData array (1-based)
            const features = [
                {
                    name: 'Mississippi River',
                    unit: 3,
                    explanation: 'The Mississippi River played a key role in westward expansion and trade. It was secured for U.S. commerce through the Louisiana Purchase (Unit 3) and was strategically important during the Civil War.'
                },
                {
                    name: 'Appalachian Mountains',
                    unit: 2,
                    explanation: 'The Appalachian Mountains formed a natural barrier to colonial expansion. After the French and Indian War, the Proclamation Line of 1763 along these mountains limited settlement beyond them (Unit 2).'
                },
                {
                    name: 'Rocky Mountains',
                    unit: 3,
                    explanation: 'The Rocky Mountains, acquired through the Louisiana Purchase, were explored by Lewis and Clark and posed a major obstacle to westward migration (Unit 3).'
                },
                {
                    name: 'Great Plains',
                    unit: 3,
                    explanation: 'The Great Plains were opened to settlement through policies like the Homestead Act and were later the site of the Dust Bowl. These developments fall under westward expansion and sectionalism (Unit 3).'
                },
                {
                    name: 'Erie Canal',
                    unit: 3,
                    explanation: 'The Erie Canal, completed in 1825, connected the Great Lakes to the Atlantic Ocean via the Hudson River. It spurred the Market Revolution and economic growth in the early 19th century (Unit 3).'
                }
            ];
            // Create section
            const section = document.createElement('div');
            section.className = 'game-section';
            const title = document.createElement('h3');
            title.textContent = 'Geography Game';
            section.appendChild(title);
            const instructions = document.createElement('p');
            instructions.textContent = 'Identify which unit best relates to each geographic feature. Select the correct unit from the choices and click Submit. Then read the explanation to understand how the feature connects to U.S. history.';
            section.appendChild(instructions);
            // Container for question and choices
            const questionDiv = document.createElement('div');
            section.appendChild(questionDiv);
            const choicesDiv = document.createElement('div');
            choicesDiv.className = 'geo-choices';
            section.appendChild(choicesDiv);
            // Feedback paragraph to display results; place it after the choices
            const feedbackPara = document.createElement('p');
            feedbackPara.id = 'geo-feedback';
            section.appendChild(feedbackPara);
            // Create submit and next buttons
            const submitBtn = document.createElement('button');
            // Explicitly specify type="button" to prevent form submission default behavior.
            submitBtn.type = 'button';
            submitBtn.textContent = 'Submit Answer';
            section.appendChild(submitBtn);
            const nextBtn = document.createElement('button');
            nextBtn.type = 'button';
            nextBtn.textContent = 'Next Question';
            nextBtn.style.marginLeft = '10px';
            nextBtn.style.display = 'none';
            section.appendChild(nextBtn);
            let currentFeatureIndex = -1;
            // Generate a list of unit numbers for choices (1 to total units)
            const unitNumbers = unitsData.map(u => u.number);
            const unitNames = unitsData.map(u => u.title.split('(')[0].trim());
            // Function to load a new question
            function loadNewQuestion() {
                // Reset feedback and hide next button
                feedbackPara.textContent = '';
                nextBtn.style.display = 'none';
                submitBtn.disabled = false;
                // Randomly pick a feature not equal to current
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * features.length);
                } while (newIndex === currentFeatureIndex && features.length > 1);
                currentFeatureIndex = newIndex;
                const feature = features[currentFeatureIndex];
                // Display question
                questionDiv.textContent = 'Which unit covers the topic most closely associated with: ' + feature.name + '?';
                // Build choices
                choicesDiv.innerHTML = '';
                // Create an array of possible choices: include correct unit and three random other units
                const choices = [];
                choices.push(feature.unit);
                while (choices.length < 4) {
                    const rand = unitNumbers[Math.floor(Math.random() * unitNumbers.length)];
                    if (!choices.includes(rand)) choices.push(rand);
                }
                // Shuffle choices
                for (let i = choices.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [choices[i], choices[j]] = [choices[j], choices[i]];
                }
                choices.forEach(num => {
                    const label = document.createElement('label');
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = 'geoChoice';
                    radio.value = num;
                    label.appendChild(radio);
                    const span = document.createElement('span');
                    // Show unit number and title
                    span.textContent = ' Unit ' + num + ' — ' + unitNames[num - 1];
                    label.appendChild(span);
                    choicesDiv.appendChild(label);
                });
            }
            // Submit handler
            submitBtn.addEventListener('click', function() {
                // If no feature has been loaded yet, do nothing
                if (currentFeatureIndex < 0) {
                    return;
                }
                const feature = features[currentFeatureIndex];
                // Get selected value
                const selectedInput = choicesDiv.querySelector('input[name="geoChoice"]:checked');
                if (!selectedInput) {
                    feedbackPara.textContent = 'Please select an answer.';
                    feedbackPara.style.color = 'red';
                    return;
                }
                const selectedValue = parseInt(selectedInput.value, 10);
                // Determine if correct
                if (selectedValue === feature.unit) {
                    feedbackPara.style.color = 'green';
                    feedbackPara.textContent = 'Correct! ' + feature.explanation;
                } else {
                    feedbackPara.style.color = 'red';
                    const correctTitle = unitNames[feature.unit - 1];
                    feedbackPara.textContent = 'Incorrect. The correct answer is Unit ' + feature.unit + ' — ' + correctTitle + '. ' + feature.explanation;
                }
                // Disable submit button until next question
                submitBtn.disabled = true;
                nextBtn.style.display = 'inline-block';

                // Also display feedback in an alert so users see it immediately
                if (feedbackPara.textContent) {
                    alert(feedbackPara.textContent);
                }
            });
            // Next handler
            nextBtn.addEventListener('click', function() {
                loadNewQuestion();
            });
            // Initialize first question
            loadNewQuestion();
            return section;
        }

        /**
         * Create a vocabulary matching activity for a given unit.  It presents a list of
         * definitions labeled with letters (A, B, C…), and for each term the student
         * selects the letter corresponding to the correct definition.  After clicking
         * "Check Answers" rows are highlighted green for correct matches and red for
         * incorrect ones.  A reset button randomizes the definitions for further practice.
         * @param {Object} unit The unit object containing vocabulary.
         * @returns {HTMLElement} The DOM element representing the matching activity.
         */
        function initVocabMatchingActivity(unit) {
            const section = document.createElement('div');
            section.className = 'game-section';
            const title = document.createElement('h3');
            title.textContent = 'Vocabulary Matching Activity';
            section.appendChild(title);
            // If no vocabulary, return a simple message
            if (!unit.vocabulary || unit.vocabulary.length === 0) {
                const p = document.createElement('p');
                p.textContent = 'No vocabulary terms for this unit.';
                section.appendChild(p);
                return section;
            }
            // Sanitize terms and definitions, remove citations, trim
            const items = unit.vocabulary.map(item => {
                const cleanTerm = (item.term || '').replace(/【[^】]*】/g, '').trim();
                const cleanDef = (item.definition || '').replace(/【[^】]*】/g, '').trim();
                return { term: cleanTerm, definition: cleanDef };
            });
            // We will shuffle definitions and assign letters
            function shuffle(array) {
                const arr = array.slice();
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            let defsShuffled = [];
            let letterMap = {};
            function initDefinitions() {
                defsShuffled = shuffle(items);
                letterMap = {};
                defsShuffled.forEach((item, idx) => {
                    letterMap[letters[idx]] = item.definition;
                });
            }
            // Initialize definitions for first time
            initDefinitions();
            // Create list of definitions with letters
            const defsList = document.createElement('ul');
            defsList.style.listStyleType = 'none';
            defsList.style.paddingLeft = '0';
            function renderDefinitions() {
                defsList.innerHTML = '';
                defsShuffled.forEach((item, idx) => {
                    const li = document.createElement('li');
                    li.textContent = letters[idx] + '. ' + item.definition;
                    defsList.appendChild(li);
                });
            }
            renderDefinitions();
            section.appendChild(defsList);
            // Create rows for each term with a select to choose a letter
            const rowsDiv = document.createElement('div');
            items.forEach(item => {
                const row = document.createElement('div');
                row.className = 'match-row';
                row.style.display = 'flex';
                row.style.alignItems = 'center';
                row.style.marginBottom = '6px';
                // Term label
                const termSpan = document.createElement('span');
                termSpan.style.flex = '1 1 60%';
                termSpan.innerHTML = '<strong>' + item.term + '</strong>';
                row.appendChild(termSpan);
                // Select element
                const select = document.createElement('select');
                select.style.flex = '1 1 40%';
                // first blank option
                const blank = document.createElement('option');
                blank.value = '';
                blank.textContent = '--';
                select.appendChild(blank);
                for (let i = 0; i < items.length; i++) {
                    const option = document.createElement('option');
                    option.value = letters[i];
                    option.textContent = letters[i];
                    select.appendChild(option);
                }
                row.appendChild(select);
                // Store correct letter in dataset for evaluation
                // Find which letter corresponds to this term's definition
                row.dataset.correctLetter = Object.keys(letterMap).find(l => letterMap[l] === item.definition) || '';
                rowsDiv.appendChild(row);
            });
            section.appendChild(rowsDiv);
            // Result display paragraph
            const resultPara = document.createElement('p');
            section.appendChild(resultPara);
            // Check Answers button
            const checkBtn = document.createElement('button');
            checkBtn.type = 'button';
            checkBtn.textContent = 'Check Answers';
            section.appendChild(checkBtn);
            // Reset button
            const resetBtn = document.createElement('button');
            resetBtn.type = 'button';
            resetBtn.textContent = 'Reset';
            resetBtn.style.marginLeft = '10px';
            section.appendChild(resetBtn);
            // Evaluation logic
            checkBtn.addEventListener('click', function() {
                let correctCount = 0;
                const rowElements = rowsDiv.querySelectorAll('.match-row');
                rowElements.forEach(row => {
                    const select = row.querySelector('select');
                    const selected = select.value;
                    // remove previous classes
                    row.classList.remove('correct', 'incorrect');
                    if (selected && selected === row.dataset.correctLetter) {
                        row.classList.add('correct');
                        correctCount++;
                    } else {
                        row.classList.add('incorrect');
                    }
                });
                resultPara.style.fontWeight = 'bold';
                resultPara.textContent = 'You got ' + correctCount + ' out of ' + rowElements.length + ' correct.';
            });
            // Reset logic
            resetBtn.addEventListener('click', function() {
                // Reinitialize definitions and reassign correct letters
                initDefinitions();
                renderDefinitions();
                const rowElements = rowsDiv.querySelectorAll('.match-row');
                rowElements.forEach((row, rowIndex) => {
                    const select = row.querySelector('select');
                    select.value = '';
                    row.classList.remove('correct', 'incorrect');
                    // update correct letter for row's term
                    row.dataset.correctLetter = Object.keys(letterMap).find(l => letterMap[l] === items[rowIndex].definition) || '';
                });
                resultPara.textContent = '';
            });
            return section;
        }

        function loadUnit(index) {
            const unit = unitsData[index];
            contentDiv.innerHTML = '';
            const title = document.createElement('h2');
            title.textContent = unit.number + ' — ' + unit.title;
            contentDiv.appendChild(title);
            const ovh3 = document.createElement('h3');
            ovh3.textContent = 'Overview';
            contentDiv.appendChild(ovh3);
            // Render the overview paragraphs. Remove citation placeholders like 【...】 and skip empty lines.
            unit.overview.forEach(par => {
                // Remove citations enclosed in brackets 【...】 and trim whitespace
                const sanitized = par.replace(/【[^】]*】/g, '').trim();
                if (sanitized) {
                    const p = document.createElement('p');
                    p.textContent = sanitized;
                    contentDiv.appendChild(p);
                }
            });
            const vH3 = document.createElement('h3');
            vH3.textContent = 'Key Vocabulary';
            contentDiv.appendChild(vH3);
            if (unit.vocabulary.length) {
                const table = document.createElement('table');
                const thead = document.createElement('thead');
                const trh = document.createElement('tr');
                trh.appendChild(Object.assign(document.createElement('th'), {textContent: 'Term'}));
                trh.appendChild(Object.assign(document.createElement('th'), {textContent: 'Definition'}));
                thead.appendChild(trh);
                table.appendChild(thead);
                const tbody = document.createElement('tbody');
                unit.vocabulary.forEach(item => {
                    const tr = document.createElement('tr');
                    // Sanitize term and definition by removing citation placeholders and trimming
                    const cleanTerm = (item.term || '').replace(/【[^】]*】/g, '').trim();
                    const cleanDef = (item.definition || '').replace(/【[^】]*】/g, '').trim();
                    tr.appendChild(Object.assign(document.createElement('td'), {textContent: cleanTerm}));
                    tr.appendChild(Object.assign(document.createElement('td'), {textContent: cleanDef}));
                    tbody.appendChild(tr);
                });
                table.appendChild(tbody);
                contentDiv.appendChild(table);
            }
            // Add vocabulary matching activity below the table
            const matchingSection = initVocabMatchingActivity(unit);
            contentDiv.appendChild(matchingSection);
            const mcH3 = document.createElement('h3');
            mcH3.textContent = 'Multiple Choice Practice';
            contentDiv.appendChild(mcH3);
            unit.mc_questions.forEach(q => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question';
                const qTitle = document.createElement('h4');
                qTitle.textContent = q.number + '. ' + q.question;
                qDiv.appendChild(qTitle);
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';
                // cache correct answer for this question to avoid closure issues
                const correctAnswer = unit.answer_key[q.number];
                q.options.forEach(opt => {
                    const label = document.createElement('label');
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = 'q' + unit.number + '_' + q.number;
                    radio.value = opt.label;
                    radio.addEventListener('click', function() {
                        // Remove any existing feedback before displaying a new message
                        const existing = qDiv.querySelector('.feedback');
                        if (existing) existing.remove();
                        const fb = document.createElement('div');
                        fb.className = 'feedback';
                        if (this.value === correctAnswer) {
                            fb.textContent = 'Correct!';
                            fb.style.color = 'green';
                        } else {
                            // Construct key to look up explanation for this unit and question
                            const explanationKey = unit.number + '-' + q.number;
                            const explanation = mcExplanations[explanationKey] || '';
                            fb.textContent = 'Incorrect. The correct answer is ' + correctAnswer + '. ' + explanation;
                            fb.style.color = 'red';
                        }
                        qDiv.appendChild(fb);
                    });
                    label.appendChild(radio);
                    const span = document.createElement('span');
                    span.textContent = ' ' + opt.label + '. ' + opt.text;
                    label.appendChild(span);
                    optionsDiv.appendChild(label);
                });
                qDiv.appendChild(optionsDiv);
                contentDiv.appendChild(qDiv);
            });
            const saH3 = document.createElement('h3');
            saH3.textContent = 'Short-Answer Practice';
            contentDiv.appendChild(saH3);
            // For each short-answer prompt, display the question and a textarea for students to type their response
            unit.short_answers.forEach((q, idx) => {
                const container = document.createElement('div');
                container.className = 'short-answer';
                // question label
                const qLabel = document.createElement('p');
                qLabel.style.fontWeight = 'bold';
                qLabel.textContent = (idx + 1) + '. ' + q;
                container.appendChild(qLabel);
                // text area for student response
                const textarea = document.createElement('textarea');
                textarea.rows = 4;
                textarea.style.width = '100%';
                textarea.placeholder = 'Write your response here...';
                container.appendChild(textarea);
                contentDiv.appendChild(container);
            });
        }
        unitsData.forEach((unit, idx) => {
            const btn = document.createElement('button');
            btn.textContent = unit.number + ' — ' + unit.title.split('(')[0].trim();
            btn.addEventListener('click', () => loadUnit(idx));
            navDiv.appendChild(btn);
        });
        // Add navigation button for essay practice
        const essayBtn = document.createElement('button');
        essayBtn.textContent = 'Essay Practice';
        essayBtn.addEventListener('click', () => loadEssayPractice());
        navDiv.appendChild(essayBtn);
        // Add navigation button for fun games
        const gamesBtn = document.createElement('button');
        gamesBtn.textContent = 'Fun Games';
        gamesBtn.addEventListener('click', () => loadGames());
        navDiv.appendChild(gamesBtn);
    </script>
